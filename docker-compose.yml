services:
  # ========== 订阅转换引擎 ==========
  subconverter:
    image: asdlokj1qpi23/subconverter:latest
    container_name: subconverter
    restart: unless-stopped
    ports:
      - "25500:25500"
    volumes:
      - ./Clash:/base/Clash
      - ./Acl:/base/Acl
      - ./Tool:/base/Tool

  # ========== 统一后端：订阅代理 + proxy-provider 转换 ==========
  sub-smart:
    build: ./smart
    image: sub-smart-local:latest
    container_name: sub-smart
    restart: unless-stopped
    ports:
      - "25600:25600"
    environment:
      - HOST_IP=${HOST_IP:-localhost}
    depends_on:
      - subconverter

  # ========== 前端 ==========
  sub-web:
    build: ./sub-web
    image: sub-web-local:latest
    container_name: sub-web
    restart: unless-stopped
    ports:
      - "58080:80"
