services:
  # ========== 纯 JS 订阅转换引擎（替代 subconverter + sub-smart）==========
  sub-smart-js:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sub-smart-js
    restart: unless-stopped
    ports:
      - "25600:25600"
    environment:
      - HOST_IP=${HOST_IP:-localhost}
    volumes:
      - ./Clash:/app/Clash

  # ========== 前端 ==========
  sub-web:
    build: ./sub-web
    image: sub-web-local:latest
    container_name: sub-web
    restart: unless-stopped
    ports:
      - "58080:80"
